<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Soyad Paneli</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .panel {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
      color: white;
    }

    .panel h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 26px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      outline: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 15px;
    }

    .input-group input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .sonuc {
      margin-top: 18px;
      text-align: center;
      font-size: 16px;
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h2>Ad Soyad Paneli</h2>

    <div class="input-group">
      <label>Ad</label>
      <input type="text" id="ad" placeholder="Adınızı girin">
    </div>

    <div class="input-group">
      <label>Soyad</label>
      <input type="text" id="soyad" placeholder="Soyadınızı girin">
    </div>

    <button onclick="goster()">Göster</button>

    <div class="sonuc" id="sonuc"></div>
  </div>

  <script>
    function goster() {
      const ad = document.getElementById("ad").value;
      const soyad = document.getElementById("soyad").value;
      const sonuc = document.getElementById("sonuc");

      if (ad === "" || soyad === "") {
        sonuc.innerHTML = "Lütfen ad ve soyad gir.";
      } else {
        sonuc.innerHTML = "Hoş geldin, " + ad + " " + soyad + "!";
      }
    }
  </script>
</body>
</html>
