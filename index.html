<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efsuncuk</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
    }

    .bg-text {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-weight: 900;
      font-size: clamp(70px, 14vw, 220px);
      color: rgba(255, 0, 0, 0.16);
      text-shadow:
        0 0 20px rgba(255, 0, 0, 0.35),
        0 0 40px rgba(255, 0, 0, 0.2),
        0 0 70px rgba(255, 0, 0, 0.15);
      letter-spacing: 6px;
      user-select: none;
      z-index: 0;
    }

    .name-text {
      position: fixed;
      left: 50%;
      top: 12%;
      transform: translateX(-50%);
      z-index: 3;
      font-size: clamp(34px, 6vw, 90px);
      font-weight: 900;
      color: rgba(255,255,255,0);
      letter-spacing: 4px;
      text-shadow:
        0 0 12px rgba(255, 80, 80, 0.65),
        0 0 28px rgba(255, 0, 0, 0.35);
      opacity: 0;
      transition: opacity 1s ease, transform 1s ease;
      pointer-events: none;
    }

    .name-text.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      color: rgba(255,255,255,0.95);
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(80,0,0,0.22), rgba(0,0,0,0.96)),
        #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: opacity 1.1s ease, visibility 1.1s ease;
    }

    .loading-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    .loading-text {
      font-size: clamp(32px, 5vw, 72px);
      font-weight: 900;
      color: #ff3b3b;
      letter-spacing: 4px;
      text-shadow:
        0 0 14px rgba(255, 0, 0, 0.85),
        0 0 28px rgba(255, 0, 0, 0.55),
        0 0 48px rgba(255, 0, 0, 0.25);
      opacity: 0;
      transform: scale(0.92);
      animation: loadingFade 2.8s ease forwards;
    }

    @keyframes loadingFade {
      0% {
        opacity: 0;
        transform: scale(0.88);
      }
      20% {
        opacity: 1;
        transform: scale(1);
      }
      75% {
        opacity: 1;
        transform: scale(1.02);
      }
      100% {
        opacity: 0;
        transform: scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-text">Hazır mısın?</div>
  </div>

  <div class="bg-text">! aura</div>
  <div class="name-text" id="nameText">Efsuncuk</div>
  <canvas id="canvas"></canvas>

  <script>
    const loadingScreen = document.getElementById("loadingScreen");
    const nameText = document.getElementById("nameText");

    setTimeout(() => {
      loadingScreen.classList.add("hide");
      nameText.classList.add("show");
    }, 2800);

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 1.5);

    const particles = [];
    const mouse = {
      x: 99999,
      y: 99999,
      radius: 85
    };

    const SETTINGS = {
      gap: 7,
      ease: 0.055,
      friction: 0.88,
      force: 3.8,
      particleSize: 1.55,
      glow: 10
    };

    function heartFn(x, y) {
      const a = x * x + y * y - 1;
      return a * a * a - x * x * y * y * y;
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      w = Math.floor(window.innerWidth);
      h = Math.floor(window.innerHeight);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildHeart();
    }

    function buildHeart() {
      particles.length = 0;

      const size = Math.min(w, h) * 0.48;
      const step = SETTINGS.gap;
      const centerX = w / 2;
      const centerY = h / 2 + 30;
      const half = size / 2;

      for (let sy = -half; sy <= half; sy += step) {
        for (let sx = -half; sx <= half; sx += step) {
          const x = sx / (size / 2.35);
          const y = sy / (size / 2.35);

          if (heartFn(x, -y) <= 0) {
            const px = centerX + sx;
            const py = centerY + sy;

            particles.push({
              x: px,
              y: py,
              baseX: px,
              baseY: py,
              vx: 0,
              vy: 0,
              size: SETTINGS.particleSize + Math.random() * 0.6
            });
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);

      const mx = mouse.x;
      const my = mouse.y;
      const radius = mouse.radius;
      const radiusSq = radius * radius;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        const dx = p.x - mx;
        const dy = p.y - my;
        const distSq = dx * dx + dy * dy;

        if (distSq < radiusSq) {
          const dist = Math.sqrt(distSq) || 0.0001;
          const power = (1 - dist / radius) * SETTINGS.force;
          p.vx += (dx / dist) * power;
          p.vy += (dy / dist) * power;
        }

        p.vx += (p.baseX - p.x) * SETTINGS.ease;
        p.vy += (p.baseY - p.y) * SETTINGS.ease;

        p.vx *= SETTINGS.friction;
        p.vy *= SETTINGS.friction;

        p.x += p.vx;
        p.y += p.vy;

        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 40, 40, 0.95)";
        ctx.shadowBlur = SETTINGS.glow;
        ctx.shadowColor = "rgba(255, 0, 0, 0.95)";
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = 99999;
      mouse.y = 99999;
    });

    window.addEventListener("resize", resize);

    resize();
    animate();
  </script>
</body>
</html>
