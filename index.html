<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalp</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const mouse = {
      x: -9999,
      y: -9999,
      radius: 90
    };

    const particles = [];
    const particleCount = 4500;

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      createHeartParticles();
    }

    window.addEventListener("resize", resizeCanvas);

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    function isInsideHeart(x, y) {
      const nx = x / 18;
      const ny = y / 18;
      const a = nx * nx + ny * ny - 1;
      return (a * a * a - nx * nx * ny * ny * ny) <= 0;
    }

    function randomPointInHeart() {
      while (true) {
        const x = (Math.random() * 2 - 1) * 18;
        const y = (Math.random() * 2 - 1) * 18;
        if (isInsideHeart(x, y)) {
          return { x, y };
        }
      }
    }

    function createHeartParticles() {
      particles.length = 0;

      const scale = Math.min(w, h) * 0.018;
      const centerX = w / 2;
      const centerY = h / 2 + 10;

      for (let i = 0; i < particleCount; i++) {
        const p = randomPointInHeart();

        const tx = centerX + p.x * scale;
        const ty = centerY - p.y * scale;

        particles.push({
          x: tx,
          y: ty,
          baseX: tx,
          baseY: ty,
          vx: 0,
          vy: 0,
          size: Math.random() * 1.8 + 0.8,
          alpha: Math.random() * 0.5 + 0.5
        });
      }
    }

    createHeartParticles();

    function animate() {
      ctx.clearRect(0, 0, w, h);

      for (const p of particles) {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < mouse.radius) {
          const force = (mouse.radius - dist) / mouse.radius;
          const angle = Math.atan2(dy, dx);
          p.vx += Math.cos(angle) * force * 3.2;
          p.vy += Math.sin(angle) * force * 3.2;
        }

        p.vx += (p.baseX - p.x) * 0.018;
        p.vy += (p.baseY - p.y) * 0.018;

        p.vx *= 0.92;
        p.vy *= 0.92;

        p.x += p.vx;
        p.y += p.vy;

        const glow = 6;

        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 40, 40, ${p.alpha})`;
        ctx.shadowBlur = glow;
        ctx.shadowColor = "rgba(255, 0, 0, 0.9)";
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
