<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalp</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let cx = 0;
    let cy = 0;

    const mouse = {
      x: -9999,
      y: -9999,
      radius: 90
    };

    const particles = [];
    const GAP = 7; // küçültürsen daha dolu olur ama biraz daha yük bindirir

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      cx = w / 2;
      cy = h / 2;
      buildHeart();
    }

    function heartEquation(x, y) {
      const a = x * x + y * y - 1;
      return a * a * a - x * x * y * y * y;
    }

    function buildHeart() {
      particles.length = 0;

      const scale = Math.min(w, h) * 0.022;

      for (let px = -18; px <= 18; px += 0.45) {
        for (let py = -18; py <= 18; py += 0.45) {
          const x = px / 18;
          const y = py / 18;

          if (heartEquation(x, y) <= 0) {
            const tx = cx + px * scale / 18;
            const ty = cy - py * scale / 18;

            if (
              Math.round((tx - cx + 9999) / GAP) % 1 === 0 &&
              Math.round((ty - cy + 9999) / GAP) % 1 === 0
            ) {
              particles.push({
                x: tx,
                y: ty,
                baseX: tx,
                baseY: ty,
                vx: 0,
                vy: 0,
                size: 2.2 + Math.random() * 1.2
              });
            }
          }
        }
      }
    }

    window.addEventListener("resize", resize);

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    function animate() {
      ctx.clearRect(0, 0, w, h);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const distSq = dx * dx + dy * dy;
        const radiusSq = mouse.radius * mouse.radius;

        if (distSq < radiusSq) {
          const dist = Math.sqrt(distSq) || 0.001;
          const force = (mouse.radius - dist) / mouse.radius;
          const push = force * 2.8;

          p.vx += (dx / dist) * push;
          p.vy += (dy / dist) * push;
        }

        p.vx += (p.baseX - p.x) * 0.035;
        p.vy += (p.baseY - p.y) * 0.035;

        p.vx *= 0.86;
        p.vy *= 0.86;

        p.x += p.vx;
        p.y += p.vy;

        ctx.beginPath();
        ctx.fillStyle = "#ff2e63";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#ff2e63";
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(animate);
    }

    resize();
    animate();
  </script>
</body>
</html>
