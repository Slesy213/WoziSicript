<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efsuncuk</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
    }

    body {
      position: relative;
      color: white;
    }

    #sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow:
        0 0 6px rgba(255,255,255,0.95),
        0 0 12px rgba(255,80,80,0.45),
        0 0 18px rgba(255,0,0,0.25);
      animation: sparkleFloat linear forwards;
    }

    .sparkle.big {
      width: 5px;
      height: 5px;
    }

    @keyframes sparkleFloat {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.6);
      }
      20% {
        opacity: 1;
        transform: translateY(0px) scale(1);
      }
      80% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translateY(-80px) scale(0.8);
      }
    }

    canvas {
      display: block;
      width: 100%;
      height: 100vh;
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: auto;
    }

    .bg-text {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-weight: 900;
      font-size: clamp(70px, 14vw, 220px);
      color: rgba(255, 0, 0, 0.16);
      text-shadow:
        0 0 20px rgba(255, 0, 0, 0.35),
        0 0 40px rgba(255, 0, 0, 0.2),
        0 0 70px rgba(255, 0, 0, 0.15);
      letter-spacing: 6px;
      user-select: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .bg-text.show {
      opacity: 1;
    }

    .intro-screen {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(80,0,0,0.22), rgba(0,0,0,0.96)),
        #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .intro-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    .intro-text {
      position: absolute;
      font-size: clamp(34px, 6vw, 90px);
      font-weight: 900;
      color: #ff3b3b;
      letter-spacing: 4px;
      text-shadow:
        0 0 14px rgba(255, 0, 0, 0.85),
        0 0 28px rgba(255, 0, 0, 0.55),
        0 0 48px rgba(255, 0, 0, 0.25);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.8s ease, transform 0.8s ease;
      text-align: center;
      padding: 20px;
    }

    .intro-text.show {
      opacity: 1;
      transform: scale(1);
    }

    .hero-space {
      height: 100vh;
      position: relative;
      z-index: 3;
    }

    .scroll-note {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 6;
      color: rgba(255,255,255,0.75);
      font-size: 15px;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(255,0,0,0.25);
      animation: upDown 1.8s ease-in-out infinite;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }

    .scroll-note.show {
      opacity: 1;
    }

    @keyframes upDown {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }

    .content {
      position: relative;
      z-index: 5;
      padding-bottom: 80px;
      background: linear-gradient(to bottom, rgba(5,5,5,0), rgba(5,5,5,0.88) 15%, #050505 40%);
    }

    .question-section,
    .gallery-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 40px;
    }

    .section-title {
      text-align: center;
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      color: #fff;
      margin-bottom: 35px;
      text-shadow:
        0 0 12px rgba(255, 0, 0, 0.45),
        0 0 30px rgba(255, 0, 0, 0.18);
    }

    .question-box {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 0, 0, 0.08);
      border: 1px solid rgba(255, 70, 70, 0.18);
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 25px rgba(255, 0, 0, 0.08),
        inset 0 0 20px rgba(255,255,255,0.02);
      text-align: center;
    }

    .question-text {
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 800;
      margin-bottom: 24px;
      color: #fff;
    }

    .question-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .love-btn {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      background: rgba(255, 0, 0, 0.18);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid rgba(255, 80, 80, 0.25);
      box-shadow: 0 0 18px rgba(255, 0, 0, 0.18);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .love-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 0, 0, 0.26);
    }

    .answer-box {
      margin-top: 22px;
      min-height: 32px;
      color: #ffd9d9;
      font-size: 20px;
      font-weight: 700;
      text-shadow: 0 0 12px rgba(255, 0, 0, 0.25);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .answer-box.show {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .gallery-card {
      background: rgba(255, 0, 0, 0.08);
      border: 1px solid rgba(255, 70, 70, 0.18);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 25px rgba(255, 0, 0, 0.08),
        inset 0 0 20px rgba(255, 255, 255, 0.02);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .gallery-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow:
        0 0 35px rgba(255, 0, 0, 0.16),
        inset 0 0 20px rgba(255, 255, 255, 0.03);
    }

    .gallery-card img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .gallery-label {
      text-align: center;
      padding: 16px;
      color: #ffd2d2;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    @media (max-width: 900px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .gallery-card img {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="intro-screen" id="introScreen">
    <div class="intro-text" id="hazirText">Hazır mısın?</div>
    <div class="intro-text" id="efsunText">Efsuncuk</div>
  </div>

  <div class="bg-text" id="bgText">! aura</div>
  <div id="sparkles"></div>
  <canvas id="canvas"></canvas>

  <audio id="bgMusic" loop autoplay playsinline>
    <source src="muzik.mp3" type="audio/mpeg">
  </audio>

  <div class="hero-space">
    <div class="scroll-note" id="scrollNote">Aşağı kaydır ↓</div>
  </div>

  <div class="content">
    <section class="question-section">
      <h2 class="section-title">Sana Bir Sorum Var</h2>
      <div class="question-box">
        <div class="question-text">Benim misin değil misin?</div>
        <div class="question-buttons">
          <button class="love-btn" onclick="showAnswer('Ben seninim ❤️')">Ben seninim ❤️</button>
          <button class="love-btn" onclick="showAnswer('Hep seninim 💖')">Hep seninim 💖</button>
        </div>
        <div class="answer-box" id="answerBox"></div>
      </div>
    </section>

    <section class="gallery-section">
      <h2 class="section-title">Galeri</h2>

      <div class="gallery-grid">
        <div class="gallery-card">
          <img src="resim1.jpg" alt="resim1">
          <div class="gallery-label">resim1</div>
        </div>

        <div class="gallery-card">
          <img src="resim2.jpg" alt="resim2">
          <div class="gallery-label">resim2</div>
        </div>

        <div class="gallery-card">
          <img src="resim3.jpg" alt="resim3">
          <div class="gallery-label">resim3</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const introScreen = document.getElementById("introScreen");
    const hazirText = document.getElementById("hazirText");
    const efsunText = document.getElementById("efsunText");
    const bgText = document.getElementById("bgText");
    const canvas = document.getElementById("canvas");
    const scrollNote = document.getElementById("scrollNote");
    const sparkles = document.getElementById("sparkles");
    const music = document.getElementById("bgMusic");
    const answerBox = document.getElementById("answerBox");

    music.volume = 0.6;

    async function tryPlayMusic() {
      try {
        await music.play();
      } catch (e) {}
    }

    window.addEventListener("load", tryPlayMusic);
    document.addEventListener("click", tryPlayMusic, { once: true });
    document.addEventListener("touchstart", tryPlayMusic, { once: true });

    function showAnswer(text) {
      answerBox.textContent = text;
      answerBox.classList.add("show");
    }

    hazirText.classList.add("show");

    setTimeout(() => {
      hazirText.classList.remove("show");
    }, 1800);

    setTimeout(() => {
      efsunText.classList.add("show");
    }, 2400);

    setTimeout(() => {
      efsunText.classList.remove("show");
    }, 4300);

    setTimeout(() => {
      introScreen.classList.add("hide");
      bgText.classList.add("show");
      canvas.style.opacity = "1";
      scrollNote.classList.add("show");
    }, 5000);

    function createSparkle() {
      const s = document.createElement("div");
      s.className = Math.random() > 0.8 ? "sparkle big" : "sparkle";
      s.style.left = Math.random() * window.innerWidth + "px";
      s.style.top = Math.random() * window.innerHeight + "px";
      s.style.animationDuration = (2 + Math.random() * 3) + "s";
      s.style.opacity = Math.random();
      sparkles.appendChild(s);

      setTimeout(() => {
        s.remove();
      }, 5000);
    }

    setInterval(createSparkle, 140);

    const ctx = canvas.getContext("2d", { alpha: true });

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 1.5);

    const particles = [];
    const mouse = {
      x: 99999,
      y: 99999,
      radius: 85
    };

    const SETTINGS = {
      gap: 8,
      ease: 0.055,
      friction: 0.88,
      force: 3.4,
      particleSize: 1.4,
      glow: 8
    };

    function heartFn(x, y) {
      const a = x * x + y * y - 1;
      return a * a * a - x * x * y * y * y;
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      w = Math.floor(window.innerWidth);
      h = Math.floor(window.innerHeight);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildHeart();
    }

    function buildHeart() {
      particles.length = 0;

      const size = Math.min(w, h) * 0.42;
      const step = SETTINGS.gap;
      const centerX = w / 2;
      const centerY = h / 2 + 10;
      const half = size / 2;

      for (let sy = -half; sy <= half; sy += step) {
        for (let sx = -half; sx <= half; sx += step) {
          const x = sx / (size / 2.35);
          const y = sy / (size / 2.35);

          if (heartFn(x, -y) <= 0) {
            const px = centerX + sx;
            const py = centerY + sy;

            particles.push({
              x: px,
              y: py,
              baseX: px,
              baseY: py,
              vx: 0,
              vy: 0,
              size: SETTINGS.particleSize + Math.random() * 0.5
            });
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);

      const mx = mouse.x;
      const my = mouse.y;
      const radius = mouse.radius;
      const radiusSq = radius * radius;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        const dx = p.x - mx;
        const dy = p.y - my;
        const distSq = dx * dx + dy * dy;

        if (distSq < radiusSq) {
          const dist = Math.sqrt(distSq) || 0.0001;
          const power = (1 - dist / radius) * SETTINGS.force;
          p.vx += (dx / dist) * power;
          p.vy += (dy / dist) * power;
        }

        p.vx += (p.baseX - p.x) * SETTINGS.ease;
        p.vy += (p.baseY - p.y) * SETTINGS.ease;

        p.vx *= SETTINGS.friction;
        p.vy *= SETTINGS.friction;

        p.x += p.vx;
        p.y += p.vy;

        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 40, 40, 0.95)";
        ctx.shadowBlur = SETTINGS.glow;
        ctx.shadowColor = "rgba(255, 0, 0, 0.95)";
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = 99999;
      mouse.y = 99999;
    });

    window.addEventListener("resize", resize);

    resize();
    animate();
  </script>
</body>
</html>
