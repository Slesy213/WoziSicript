<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efsuncuk</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
    }

    body {
      position: relative;
      color: white;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 0, 0, 0.12), transparent 35%),
        radial-gradient(circle at 20% 80%, rgba(255, 60, 60, 0.08), transparent 30%),
        radial-gradient(circle at 80% 75%, rgba(255, 30, 30, 0.08), transparent 30%),
        linear-gradient(to bottom, #020202 0%, #050505 50%, #080808 100%);
    }

    #bgGlow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      animation: floatOrb linear infinite;
      background: radial-gradient(circle, rgba(255,0,0,0.65), rgba(255,0,0,0));
    }

    .orb1 {
      width: 320px;
      height: 320px;
      left: 5%;
      top: 10%;
      animation-duration: 16s;
    }

    .orb2 {
      width: 420px;
      height: 420px;
      right: 6%;
      top: 18%;
      animation-duration: 20s;
    }

    .orb3 {
      width: 360px;
      height: 360px;
      left: 32%;
      bottom: 10%;
      animation-duration: 18s;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.05); }
      50% { transform: translate(-20px, 35px) scale(0.95); }
      75% { transform: translate(25px, 15px) scale(1.04); }
      100% { transform: translate(0, 0) scale(1); }
    }

    #sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow:
        0 0 6px rgba(255,255,255,0.95),
        0 0 12px rgba(255,80,80,0.45),
        0 0 18px rgba(255,0,0,0.25);
      animation: sparkleFloat linear forwards;
    }

    .sparkle.big {
      width: 5px;
      height: 5px;
    }

    .dust {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 90, 90, 0.28);
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.22);
      animation: dustFloat linear forwards;
    }

    @keyframes sparkleFloat {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.6);
      }
      20% {
        opacity: 1;
        transform: translateY(0px) scale(1);
      }
      80% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translateY(-80px) scale(0.8);
      }
    }

    @keyframes dustFloat {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.7);
      }
      20% {
        opacity: 0.65;
      }
      100% {
        opacity: 0;
        transform: translateY(-120px) scale(1.2);
      }
    }

    canvas {
      display: block;
      width: 100%;
      height: 100vh;
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: auto;
    }

    .bg-text {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-weight: 900;
      font-size: clamp(70px, 14vw, 220px);
      color: rgba(255, 0, 0, 0.16);
      text-shadow:
        0 0 20px rgba(255, 0, 0, 0.35),
        0 0 40px rgba(255, 0, 0, 0.2),
        0 0 70px rgba(255, 0, 0, 0.15);
      letter-spacing: 6px;
      user-select: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .bg-text.show {
      opacity: 1;
    }

    .intro-screen {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(80,0,0,0.22), rgba(0,0,0,0.96)),
        #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .intro-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    .intro-text {
      position: absolute;
      font-size: clamp(34px, 6vw, 90px);
      font-weight: 900;
      color: #ff3b3b;
      letter-spacing: 4px;
      text-shadow:
        0 0 14px rgba(255, 0, 0, 0.85),
        0 0 28px rgba(255, 0, 0, 0.55),
        0 0 48px rgba(255, 0, 0, 0.25);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.8s ease, transform 0.8s ease;
      text-align: center;
      padding: 20px;
    }

    .intro-text.show {
      opacity: 1;
      transform: scale(1);
    }

    .hero-space {
      height: 100vh;
      position: relative;
      z-index: 3;
    }

    .scroll-note {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 6;
      color: rgba(255,255,255,0.75);
      font-size: 15px;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(255,0,0,0.25);
      animation: upDown 1.8s ease-in-out infinite;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }

    .scroll-note.show {
      opacity: 1;
    }

    @keyframes upDown {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }

    .content {
      position: relative;
      z-index: 5;
      padding-bottom: 80px;
      background: linear-gradient(to bottom, rgba(5,5,5,0), rgba(5,5,5,0.88) 15%, #050505 40%);
    }

    .gallery-section {
      max-width: 1300px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .gallery-title {
      text-align: center;
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      color: #fff;
      margin-bottom: 35px;
      text-shadow:
        0 0 12px rgba(255, 0, 0, 0.45),
        0 0 30px rgba(255, 0, 0, 0.18);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      align-items: stretch;
    }

    .gallery-card {
      background: rgba(255, 0, 0, 0.08);
      border: 1px solid rgba(255, 70, 70, 0.18);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 25px rgba(255, 0, 0, 0.08),
        inset 0 0 20px rgba(255, 255, 255, 0.02);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      cursor: pointer;
      position: relative;
    }

    .gallery-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow:
        0 0 35px rgba(255, 0, 0, 0.16),
        inset 0 0 20px rgba(255, 255, 255, 0.03);
    }

    .gallery-card img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
      background: #111;
      transition: transform 0.4s ease;
    }

    .gallery-card:hover img {
      transform: scale(1.04);
    }

    .gallery-label {
      text-align: center;
      padding: 16px;
      color: #ffd2d2;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .gallery-card.featured {
      grid-column: span 2;
      grid-row: span 2;
      background: rgba(255, 0, 0, 0.12);
      border: 1px solid rgba(255, 90, 90, 0.35);
      box-shadow:
        0 0 45px rgba(255, 0, 0, 0.18),
        inset 0 0 30px rgba(255, 255, 255, 0.03);
      position: relative;
    }

    .gallery-card.featured::after {
      content: "Özel";
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255, 0, 0, 0.85);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: 0 0 18px rgba(255, 0, 0, 0.45);
      z-index: 2;
    }

    .gallery-card.featured img {
      height: 100%;
      min-height: 780px;
      object-fit: cover;
    }

    .featured-heart-wrap {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 3;
      pointer-events: none;
    }

    .featured-heart {
      width: 74px;
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.14), rgba(255,0,0,0.08));
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 18px rgba(255, 70, 70, 0.25),
        0 0 32px rgba(255, 0, 0, 0.18),
        inset 0 0 18px rgba(255,255,255,0.08);
      animation: heartPulse 2.2s ease-in-out infinite;
    }

    .featured-heart svg {
      width: 38px;
      height: 38px;
      fill: #ff4d6d;
      filter:
        drop-shadow(0 0 6px rgba(255, 77, 109, 0.9))
        drop-shadow(0 0 14px rgba(255, 0, 0, 0.55));
      animation: heartBeat 1.35s ease-in-out infinite;
    }

    @keyframes heartPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 0 18px rgba(255, 70, 70, 0.25),
          0 0 32px rgba(255, 0, 0, 0.18),
          inset 0 0 18px rgba(255,255,255,0.08);
      }
      50% {
        transform: scale(1.06);
        box-shadow:
          0 0 24px rgba(255, 70, 70, 0.35),
          0 0 42px rgba(255, 0, 0, 0.24),
          inset 0 0 22px rgba(255,255,255,0.12);
      }
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.14); }
      28% { transform: scale(1); }
      42% { transform: scale(1.1); }
      70% { transform: scale(1); }
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      padding: 20px;
    }

    .lightbox.show {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-content {
      position: relative;
      max-width: min(1100px, 95vw);
      max-height: 90vh;
      transform: scale(0.9);
      transition: transform 0.35s ease;
    }

    .lightbox.show .lightbox-content {
      transform: scale(1);
    }

    .lightbox img {
      width: 100%;
      max-width: 1100px;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      border-radius: 24px;
      box-shadow:
        0 0 35px rgba(255, 0, 0, 0.22),
        0 0 80px rgba(255, 0, 0, 0.12);
      border: 1px solid rgba(255, 80, 80, 0.25);
      background: #111;
    }

    .lightbox-caption {
      text-align: center;
      margin-top: 14px;
      font-size: 20px;
      font-weight: 700;
      color: #ffd4d4;
      text-shadow: 0 0 12px rgba(255,0,0,0.25);
      min-height: 24px;
    }

    .lightbox-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 0, 0, 0.92);
      color: white;
      font-size: 26px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(255, 0, 0, 0.4);
    }

    .lightbox-close:hover {
      transform: scale(1.08);
    }

    @media (max-width: 900px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .gallery-card img {
        height: 320px;
      }

      .gallery-card.featured {
        grid-column: span 1;
        grid-row: span 1;
      }

      .gallery-card.featured img {
        min-height: 420px;
        height: 420px;
      }

      .featured-heart-wrap {
        bottom: 18px;
      }

      .featured-heart {
        width: 64px;
        height: 64px;
      }

      .featured-heart svg {
        width: 32px;
        height: 32px;
      }

      .lightbox-close {
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="bgGlow">
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
    <div class="glow-orb orb3"></div>
  </div>

  <div class="intro-screen" id="introScreen">
    <div class="intro-text" id="hazirText">Hazır mısın?</div>
    <div class="intro-text" id="efsunText">Efsuncuk</div>
  </div>

  <div class="bg-text" id="bgText">cherrie</div>
  <div id="sparkles"></div>
  <canvas id="canvas"></canvas>

  <audio id="bgMusic" loop autoplay playsinline>
    <source src="muzik.mp3" type="audio/mpeg">
  </audio>

  <div class="hero-space">
    <div class="scroll-note" id="scrollNote">Aşağı kaydır ↓</div>
  </div>

  <div class="content">
    <section class="gallery-section">
      <h2 class="gallery-title">Galeri</h2>

      <div class="gallery-grid">
        <div class="gallery-card" data-image="resim1.jpg" data-caption="Foto 1">
          <img src="resim1.jpg" alt="resim1">
          <div class="gallery-label">Foto 1</div>
        </div>

        <div class="gallery-card" data-image="resim2.jpg" data-caption="Foto 2">
          <img src="resim2.jpg" alt="resim2">
          <div class="gallery-label">Foto 2</div>
        </div>

        <div class="gallery-card" data-image="resim3.jpg" data-caption="Foto 3">
          <img src="resim3.jpg" alt="resim3">
          <div class="gallery-label">Foto 3</div>
        </div>

        <div class="gallery-card" data-image="resim4.jpg" data-caption="Foto 4">
          <img src="resim4.jpg" alt="resim4">
          <div class="gallery-label">Foto 4</div>
        </div>

        <div class="gallery-card" data-image="resim5.jpg" data-caption="Foto 5">
          <img src="resim5.jpg" alt="resim5">
          <div class="gallery-label">Foto 5</div>
        </div>

        <div class="gallery-card" data-image="resim6.jpg" data-caption="Foto 6">
          <img src="resim6.jpg" alt="resim6">
          <div class="gallery-label">Foto 6</div>
        </div>

        <div class="gallery-card" data-image="resim7.jpg" data-caption="Foto 7">
          <img src="resim7.jpg" alt="resim7">
          <div class="gallery-label">Foto 7</div>
        </div>

        <div class="gallery-card featured" data-image="resim8.jpg" data-caption="">
          <img src="resim8.jpg" alt="resim8">

          <div class="featured-heart-wrap">
            <div class="featured-heart">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose">&times;</button>
      <img id="lightboxImg" src="" alt="Büyütülmüş fotoğraf">
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>

  <script>
    const introScreen = document.getElementById("introScreen");
    const hazirText = document.getElementById("hazirText");
    const efsunText = document.getElementById("efsunText");
    const bgText = document.getElementById("bgText");
    const canvas = document.getElementById("canvas");
    const scrollNote = document.getElementById("scrollNote");
    const sparkles = document.getElementById("sparkles");
    const music = document.getElementById("bgMusic");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxCaption = document.getElementById("lightboxCaption");
    const lightboxClose = document.getElementById("lightboxClose");
    const galleryCards = document.querySelectorAll(".gallery-card");

    music.volume = 0.6;

    async function tryPlayMusic() {
      try {
        await music.play();
      } catch (e) {}
    }

    window.addEventListener("load", tryPlayMusic);
    document.addEventListener("click", tryPlayMusic, { once: true });
    document.addEventListener("touchstart", tryPlayMusic, { once: true });

    hazirText.classList.add("show");

    setTimeout(() => {
      hazirText.classList.remove("show");
    }, 1800);

    setTimeout(() => {
      efsunText.classList.add("show");
    }, 2400);

    setTimeout(() => {
      efsunText.classList.remove("show");
    }, 4300);

    setTimeout(() => {
      introScreen.classList.add("hide");
      bgText.classList.add("show");
      canvas.style.opacity = "1";
      scrollNote.classList.add("show");
    }, 5000);

    function createSparkle() {
      const s = document.createElement("div");
      s.className = Math.random() > 0.8 ? "sparkle big" : "sparkle";
      s.style.left = Math.random() * window.innerWidth + "px";
      s.style.top = Math.random() * window.innerHeight + "px";
      s.style.animationDuration = (2 + Math.random() * 3) + "s";
      s.style.opacity = Math.random();
      sparkles.appendChild(s);

      setTimeout(() => {
        s.remove();
      }, 5000);
    }

    function createDust() {
      const d = document.createElement("div");
      const size = 2 + Math.random() * 4;
      d.className = "dust";
      d.style.width = size + "px";
      d.style.height = size + "px";
      d.style.left = Math.random() * window.innerWidth + "px";
      d.style.top = window.innerHeight + 20 + "px";
      d.style.animationDuration = (4 + Math.random() * 5) + "s";
      sparkles.appendChild(d);

      setTimeout(() => {
        d.remove();
      }, 9000);
    }

    setInterval(createSparkle, 140);
    setInterval(createDust, 260);

    galleryCards.forEach(card => {
      card.addEventListener("click", () => {
        const image = card.getAttribute("data-image");
        const caption = card.getAttribute("data-caption") || "";
        lightboxImg.src = image;
        lightboxCaption.textContent = caption;
        lightbox.classList.add("show");
        document.body.style.overflow = "hidden";
      });
    });

    function closeLightbox() {
      lightbox.classList.remove("show");
      document.body.style.overflow = "";
      setTimeout(() => {
        lightboxImg.src = "";
      }, 250);
    }

    lightboxClose.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && lightbox.classList.contains("show")) {
        closeLightbox();
      }
    });

    const ctx = canvas.getContext("2d", { alpha: true });

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 1.5);

    const particles = [];
    const mouse = {
      x: 99999,
      y: 99999,
      radius: 85
    };

    const SETTINGS = {
      gap: 8,
      ease: 0.055,
      friction: 0.88,
      force: 3.4,
      particleSize: 1.4,
      glow: 8
    };

    function heartFn(x, y) {
      const a = x * x + y * y - 1;
      return a * a * a - x * x * y * y * y;
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      w = Math.floor(window.innerWidth);
      h = Math.floor(window.innerHeight);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildHeart();
    }

    function buildHeart() {
      particles.length = 0;

      const size = Math.min(w, h) * 0.42;
      const step = SETTINGS.gap;
      const centerX = w / 2;
      const centerY = h / 2 + 10;
      const half = size / 2;

      for (let sy = -half; sy <= half; sy += step) {
        for (let sx = -half; sx <= half; sx += step) {
          const x = sx / (size / 2.35);
          const y = sy / (size / 2.35);

          if (heartFn(x, -y) <= 0) {
            const px = centerX + sx;
            const py = centerY + sy;

            particles.push({
              x: px,
              y: py,
              baseX: px,
              baseY: py,
              vx: 0,
              vy: 0,
              size: SETTINGS.particleSize + Math.random() * 0.5
            });
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);

      const mx = mouse.x;
      const my = mouse.y;
      const radius = mouse.radius;
      const radiusSq = radius * radius;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        const dx = p.x - mx;
        const dy = p.y - my;
        const distSq = dx * dx + dy * dy;

        if (distSq < radiusSq) {
          const dist = Math.sqrt(distSq) || 0.0001;
          const power = (1 - dist / radius) * SETTINGS.force;
          p.vx += (dx / dist) * power;
          p.vy += (dy / dist) * power;
        }

        p.vx += (p.baseX - p.x) * SETTINGS.ease;
        p.vy += (p.baseY - p.y) * SETTINGS.ease;

        p.vx *= SETTINGS.friction;
        p.vy *= SETTINGS.friction;

        p.x += p.vx;
        p.y += p.vy;

        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 40, 40, 0.95)";
        ctx.shadowBlur = SETTINGS.glow;
        ctx.shadowColor = "rgba(255, 0, 0, 0.95)";
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = 99999;
      mouse.y = 99999;
    });

    window.addEventListener("resize", resize);

    resize();
    animate();
  </script>
</body>
