<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalp</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
font-family:Arial;
}

/* ORTADAKİ KALP */
.heart{
font-size:120px;
cursor:pointer;
transition:transform 0.2s;
}

.heart:hover{
transform:scale(1.2);
}

/* PATLAYAN KALPLER */
.smallHeart{
position:absolute;
font-size:24px;
pointer-events:none;
animation:fly 1s ease-out forwards;
}

@keyframes fly{
0%{
opacity:1;
transform:translate(0,0) scale(1);
}
100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(1.5);
}
}

</style>
</head>

<body>

<div class="heart" id="heart">❤️</div>

<script>

const heart = document.getElementById("heart")

heart.addEventListener("mousemove",function(e){

for(let i=0;i<6;i++){

const small = document.createElement("div")
small.className="smallHeart"
small.innerHTML="❤️"

const x = (Math.random()*200-100)+"px"
const y = (Math.random()*200-100)+"px"

small.style.setProperty("--x",x)
small.style.setProperty("--y",y)

small.style.left = e.clientX+"px"
small.style.top = e.clientY+"px"

document.body.appendChild(small)

setTimeout(()=>{
small.remove()
},1000)

}

})

</script>

</body>
</html>
